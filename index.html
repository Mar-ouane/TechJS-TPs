<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📚 Book Reading Tracker</title>
  <meta name="description" content="Track your reading journey – log books, monitor progress, and celebrate milestones." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: #0c1220; }
    .progress-bar { transition: width 0.8s cubic-bezier(.4,0,.2,1); }
    .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 24px 48px rgba(0,0,0,0.4); border-color: #4f46e5; }
    .modal-backdrop { background: rgba(0,0,0,0.65); backdrop-filter: blur(10px); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0c1220; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 4px; }
    .glow-btn { box-shadow: 0 0 20px rgba(99,102,241,0.35); }
    .glow-btn:hover { box-shadow: 0 0 32px rgba(99,102,241,0.55); }
    .stat-card { background: linear-gradient(135deg, #1e293b 0%, #162032 100%); }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    select option { background: #1e293b; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .book-card { animation: fadeInUp 0.35s ease both; }
  </style>
</head>

<body class="min-h-screen text-white">

  <!-- ─── NAVBAR ──────────────────────────────────────────────────────────── -->
  <nav class="sticky top-0 z-40 border-b border-white/5 bg-[#0c1220]/80 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-lg shadow-lg">📚</div>
        <div>
          <h1 class="text-lg font-bold text-white leading-none">Book Tracker</h1>
          <p class="text-xs text-slate-500 mt-0.5">Reading Journal</p>
        </div>
      </div>
      <button
        id="open-form-btn"
        class="glow-btn bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white px-5 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2 transition-all duration-200"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
        </svg>
        Add Book
      </button>
    </div>
  </nav>

  <!-- ─── MAIN CONTENT ────────────────────────────────────────────────────── -->
  <main class="max-w-7xl mx-auto px-6 py-10">

    <!-- GLOBAL STATS -->
    <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">

      <div class="stat-card rounded-2xl p-5 border border-white/5">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-xl bg-indigo-500/15 flex items-center justify-center text-xl">📚</div>
          <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Total Books</span>
        </div>
        <div class="text-4xl font-extrabold text-indigo-400 tabular-nums" id="stat-total">0</div>
      </div>

      <div class="stat-card rounded-2xl p-5 border border-white/5">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-xl bg-emerald-500/15 flex items-center justify-center text-xl">✅</div>
          <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Finished</span>
        </div>
        <div class="text-4xl font-extrabold text-emerald-400 tabular-nums" id="stat-finished">0</div>
      </div>

      <div class="stat-card rounded-2xl p-5 border border-white/5">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-xl bg-purple-500/15 flex items-center justify-center text-xl">📖</div>
          <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Reading</span>
        </div>
        <div class="text-4xl font-extrabold text-purple-400 tabular-nums" id="stat-reading">0</div>
      </div>

      <div class="stat-card rounded-2xl p-5 border border-white/5">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-xl bg-amber-500/15 flex items-center justify-center text-xl">📃</div>
          <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Pages Read</span>
        </div>
        <div class="text-4xl font-extrabold text-amber-400 tabular-nums" id="stat-pages">0</div>
      </div>

    </section>

    <!-- FILTERS -->
    <div class="flex flex-wrap gap-3 mb-8">
      <div class="relative flex-1 min-w-[200px]">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="Search title or author…"
          class="w-full bg-slate-800/60 border border-white/8 text-white rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent placeholder-slate-500"
        />
      </div>
      <select id="filter-status" class="bg-slate-800/60 border border-white/8 text-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="">All Statuses</option>
        <option>Read</option><option>Re-read</option><option>DNF</option>
        <option>Currently reading</option><option>Returned Unread</option><option>Want to read</option>
      </select>
      <select id="filter-format" class="bg-slate-800/60 border border-white/8 text-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="">All Formats</option>
        <option>Print</option><option>PDF</option><option>Ebook</option><option>AudioBook</option>
      </select>
    </div>

    <!-- BOOKS GRID -->
    <div id="books-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

    <!-- EMPTY STATE -->
    <div id="empty-state" class="hidden flex flex-col items-center justify-center py-28 text-center">
      <div class="text-6xl mb-5 opacity-40">📭</div>
      <h2 class="text-xl font-semibold text-slate-300 mb-2">No books found</h2>
      <p class="text-slate-500 text-sm max-w-xs">Add your first book using the button above, or try adjusting your filters.</p>
    </div>

  </main>

  <!-- ─── ADD / EDIT MODAL ─────────────────────────────────────────────────── -->
  <div
    id="book-modal"
    class="modal-backdrop hidden fixed inset-0 z-50 items-center justify-center p-4"
    aria-modal="true" role="dialog"
  >
    <div class="bg-[#151f30] border border-white/10 rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">

      <!-- Modal Header -->
      <div class="flex items-center justify-between px-6 py-5 border-b border-white/8">
        <h2 id="modal-title" class="text-lg font-bold text-white">Add New Book</h2>
        <button id="modal-close" class="text-slate-500 hover:text-white transition-colors p-1 rounded-lg hover:bg-white/8">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Form -->
      <form id="book-form" class="px-6 py-6 space-y-4" novalidate>

        <!-- Error banner -->
        <div id="form-error" class="hidden bg-red-500/15 border border-red-500/30 text-red-300 text-sm rounded-xl px-4 py-3"></div>

        <!-- Title -->
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5" for="form-title">Title <span class="text-red-400">*</span></label>
          <input id="form-title" name="form-title" type="text" required placeholder="e.g. Clean Code"
            class="w-full bg-slate-800 border border-white/8 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-500" />
        </div>

        <!-- Author -->
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5" for="form-author">Author <span class="text-red-400">*</span></label>
          <input id="form-author" name="form-author" type="text" required placeholder="e.g. Robert C. Martin"
            class="w-full bg-slate-800 border border-white/8 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-500" />
        </div>

        <!-- Pages + Pages Read -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="form-pages">Total Pages <span class="text-red-400">*</span></label>
            <input id="form-pages" name="form-pages" type="number" min="1" required placeholder="e.g. 464"
              class="w-full bg-slate-800 border border-white/8 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="form-pagesRead">Pages Read</label>
            <input id="form-pagesRead" name="form-pagesRead" type="number" min="0" value="0" placeholder="0"
              class="w-full bg-slate-800 border border-white/8 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-500" />
          </div>
        </div>

        <!-- Status + Format -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="form-status">Status <span class="text-red-400">*</span></label>
            <select id="form-status" name="form-status" required
              class="w-full bg-slate-800 border border-white/8 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="Want to read">Want to read</option>
              <option value="Currently reading">Currently reading</option>
              <option value="Read">Read</option>
              <option value="Re-read">Re-read</option>
              <option value="DNF">DNF</option>
              <option value="Returned Unread">Returned Unread</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="form-format">Format <span class="text-red-400">*</span></label>
            <select id="form-format" name="form-format" required
              class="w-full bg-slate-800 border border-white/8 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="Print">📖 Print</option>
              <option value="PDF">📄 PDF</option>
              <option value="Ebook">📱 Ebook</option>
              <option value="AudioBook">🎧 AudioBook</option>
            </select>
          </div>
        </div>

        <!-- Price + Suggested By -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="form-price">Price ($)</label>
            <input id="form-price" name="form-price" type="number" min="0" step="0.01" placeholder="0.00"
              class="w-full bg-slate-800 border border-white/8 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="form-suggestedBy">Suggested By</label>
            <input id="form-suggestedBy" name="form-suggestedBy" type="text" placeholder="e.g. Friend, Reddit…"
              class="w-full bg-slate-800 border border-white/8 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-500" />
          </div>
        </div>

        <!-- Submit -->
        <div class="flex gap-3 pt-2">
          <button type="button" id="modal-cancel"
            class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-xl py-3 text-sm font-semibold transition-colors">
            Cancel
          </button>
          <button type="submit"
            class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white rounded-xl py-3 text-sm font-semibold transition-all glow-btn">
            Save Book
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- ─── Script ───────────────────────────────────────────────────────────── -->
  <script type="module" src="/js/app.js"></script>
  <script>
    // Cancel button also closes modal
    document.getElementById('modal-cancel').addEventListener('click', () => {
      document.getElementById('book-modal').classList.add('hidden');
      document.getElementById('book-modal').classList.remove('flex');
    });
  </script>
</body>
</html>
